<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rain In The Valley — EarthPulse</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="assets/css/site.css" />
  <script src="assets/js/nav.js" defer></script>
  <script type="importmap">
  {"imports":{
    "three":         "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"
  }}</script>
  <style>
    body { overflow: hidden; }
    .shell {
      height: calc(100vh - 74px);
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 12px 16px 10px;
      box-sizing: border-box;
    }
    .viewport {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(100,140,80,.3);
      box-shadow: 0 16px 48px rgba(0,20,0,.55);
      min-height: 0;
    }
    canvas { width:100%; height:100%; display:block; }
    .hud { position:absolute; inset:0; pointer-events:none; }
    #status {
      position:absolute; top:12px; left:50%; transform:translateX(-50%);
      background:rgba(5,18,8,.88); border:1px solid rgba(80,200,100,.32);
      color:rgba(140,240,155,.95); font-size:11px; font-weight:700;
      letter-spacing:.1em; text-transform:uppercase;
      padding:5px 14px; border-radius:999px; white-space:nowrap;
    }
    #ver {
      position:absolute; top:12px; left:12px;
      background:rgba(200,80,40,.85); color:#fff;
      font-size:10px; font-weight:700; padding:3px 8px;
      border-radius:6px; letter-spacing:.08em;
    }
    .stats { position:absolute; top:12px; right:12px; display:grid; gap:5px; }
    .stat {
      background:rgba(5,18,8,.84); border:1px solid rgba(80,200,100,.2);
      color:rgba(160,235,175,.92); font-size:11px; font-family:monospace;
      padding:4px 10px; border-radius:8px; text-align:right;
    }
    .val { color:#70ffaa; font-weight:700; }
    .legend { position:absolute; bottom:12px; left:12px; display:grid; gap:4px; }
    .leg {
      display:flex; align-items:center; gap:7px;
      background:rgba(5,18,8,.78); padding:3px 9px;
      border-radius:6px; font-size:10px; color:rgba(190,230,200,.9);
    }
    .sw { width:18px; height:6px; border-radius:2px; flex-shrink:0; }
    .controls {
      display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:9px 0 0;
    }
    .btn {
      padding:7px 16px; border-radius:999px; cursor:pointer;
      font-size:13px; font-weight:600;
      border:1px solid rgba(100,140,80,.4);
      background:rgba(248,244,228,.92); color:#1e3020;
      transition:background 140ms, transform 110ms;
    }
    .btn:hover { background:#ede7cc; transform:translateY(-1px); }
    .btn.go { background:#2d7a4f; border-color:#2d7a4f; color:#fff; }
    .btn.go:hover { background:#389962; }
    .btn.rst { background:rgba(160,70,55,.1); border-color:rgba(160,70,55,.38); color:#7a3018; }
    .sg { display:flex; gap:5px; }
    .sc {
      padding:6px 13px; border-radius:999px; cursor:pointer;
      font-size:12px; font-weight:600;
      border:1px solid rgba(100,140,80,.28);
      background:rgba(248,243,222,.85); color:rgba(30,50,28,.88);
      transition:all 140ms;
    }
    .sc:hover { transform:translateY(-1px); }
    .sc.on { color:#fff; }
    .sc[data-s="concrete"].on { background:#b03020; border-color:#b03020; }
    .sc[data-s="degraded"].on { background:#b87010; border-color:#b87010; }
    .sc[data-s="regen"].on    { background:#2d7a4f; border-color:#2d7a4f; }
    .dv { width:1px; height:22px; background:rgba(100,140,80,.28); flex-shrink:0; }
    .spg { display:flex; gap:4px; align-items:center; }
    .spl { font-size:11px; color:rgba(30,50,28,.6); margin-right:2px; }
    .sp {
      padding:4px 9px; border-radius:7px; cursor:pointer; font-size:11px;
      border:1px solid rgba(100,140,80,.26);
      background:rgba(248,243,222,.84); color:rgba(30,50,28,.86);
      transition:all 120ms;
    }
    .sp.on { background:rgba(100,140,80,.22); border-color:rgba(100,140,80,.5); font-weight:700; }
  </style>
</head>
<body data-page="rain-valley">
<div id="site-nav"></div>
<main class="shell">
  <div class="viewport">
    <canvas id="c"></canvas>
    <div class="hud">
      <div id="ver">RAIN IN THE VALLEY</div>
      <div id="status">Select scenario · Run Storm</div>
      <div class="stats">
        <div class="stat">Time&nbsp;<span class="val" id="st">0.0 hr</span></div>
        <div class="stat">Runoff&nbsp;<span class="val" id="sr">0 mm</span></div>
        <div class="stat">Depth&nbsp;<span class="val" id="sd">0.0 mm</span></div>
      </div>
      <div class="legend">
        <div class="leg"><div class="sw" style="background:#1050a0"></div>Deep water</div>
        <div class="leg"><div class="sw" style="background:#50a8e8"></div>Surface flow</div>
        <div class="leg"><div class="sw" style="background:#2d5c20"></div>Valley floor</div>
        <div class="leg"><div class="sw" style="background:#705030"></div>Slopes</div>
        <div class="leg"><div class="sw" style="background:#806858"></div>Ridge</div>
      </div>
    </div>
  </div>
  <div class="controls">
    <button class="btn go"  id="play">&#9654; Run Storm</button>
    <button class="btn rst" id="rst">&#8635; Reset</button>
    <div class="dv"></div>
    <div class="sg">
      <button class="sc"    data-s="concrete">Concrete</button>
      <button class="sc on" data-s="degraded">Degraded</button>
      <button class="sc"    data-s="regen">Regenerative</button>
    </div>
    <div class="dv"></div>
    <div class="spg">
      <span class="spl">Speed:</span>
      <button class="sp"    data-v="1">1x</button>
      <button class="sp on" data-v="2">2x</button>
      <button class="sp"    data-v="4">4x</button>
    </div>
  </div>
</main>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Grid ─────────────────────────────────────────────────────────────────────
const G  = 60;    // cells per side
const W  = 12;    // world width/depth
const ES = 0.35;  // elevation → Three.js Y
const WS = 0.05;  // mm water → Three.js Y

// ─── Scenarios ────────────────────────────────────────────────────────────────
const SOIL = {
  concrete: { ksat:  0, cap:   0 },
  degraded: { ksat:  8, cap:  20 },
  regen:    { ksat: 95, cap: 115 },
};

// ─── DEM — zero noise, pure math ─────────────────────────────────────────────
//
//  xn = (col / (G-1)) * 2 - 1        range [-1, +1]  west→east
//  yn =  row / (G-1)                  range [0,  1]   south/outlet → north/headwaters
//
//  Z  = wall(xn)  +  slope(yn)  −  channel(xn)
//
//  wall(xn)    = 6 * xn²               0 at centre, 6 at edge
//  slope(yn)   = 5 * yn                0 at outlet, 5 at headwaters
//  channel(xn) = 3 * max(0, 1−(xn/0.3)²)   parabolic notch, width ±0.3
//
//  Key heights (no noise):
//    ridge corners   (xn=±1, yn=1) : 6 + 5 − 0   = 11
//    headwaters floor(xn= 0, yn=1) : 0 + 5 − 3   =  2
//    outlet walls    (xn=±1, yn=0) : 6 + 0 − 0   =  6
//    outlet floor    (xn= 0, yn=0) : 0 + 0 − 3   → clamped 0  (exit point)
//
//  ELEV_SCALE 0.35 → max Three.js height = 11 × 0.35 = 3.85 units

const dem    = new Float32Array(G * G);
let   maxDEM = 0;

for (let row = 0; row < G; row++) {
  for (let col = 0; col < G; col++) {
    const xn  = (col / (G - 1)) * 2 - 1;
    const yn  =  row / (G - 1);
    const z   = Math.max(0,
      6.0 * xn * xn
    + 5.0 * yn
    - 3.0 * Math.max(0, 1 - (xn / 0.3) * (xn / 0.3))
    );
    dem[row * G + col] = z;
    if (z > maxDEM) maxDEM = z;
  }
}

// ─── Sim ──────────────────────────────────────────────────────────────────────
const DT    = 5 / 60;   // 5-min step in hours
const RAIN  = 30;       // mm/hr
const STORM = 3;        // hours of rain
const TOTAL = 6;        // total sim hours
const DIRS  = [[-1,0],[1,0],[0,-1],[0,1]];

let surf, stor, wnext;
let tSim = 0, outflow = 0, running = false, done = false;
let scenario = 'degraded', spf = 2;

function allocSim() {
  surf   = new Float32Array(G * G);
  stor   = new Float32Array(G * G).fill(SOIL[scenario].cap);
  wnext  = new Float32Array(G * G);
  tSim = 0; outflow = 0; done = false;
}
allocSim();

function simStep() {
  const { ksat } = SOIL[scenario];

  // Rain
  if (tSim < STORM)
    for (let i = 0; i < G * G; i++) surf[i] += RAIN * DT;

  // Infiltration
  for (let i = 0; i < G * G; i++) {
    const inf = Math.min(surf[i], ksat * DT, stor[i]);
    surf[i] -= inf;
    stor[i] -= inf;
  }

  // D8 routing
  wnext.set(surf);
  for (let r = 0; r < G; r++) {
    for (let c = 0; c < G; c++) {
      const i  = r * G + c;
      const hi = dem[i] + surf[i];
      const f  = [0, 0, 0, 0];
      let   tot = 0;
      for (let d = 0; d < 4; d++) {
        const nr = r + DIRS[d][0], nc = c + DIRS[d][1];
        if (nr < 0 || nr >= G || nc < 0 || nc >= G) continue;
        const dh = hi - (dem[nr * G + nc] + surf[nr * G + nc]);
        if (dh > 0) { f[d] = 0.42 * Math.min(dh / (dh + 0.6), 1); tot += f[d]; }
      }
      if (tot === 0) continue;
      if (tot > 1) { const s = 1 / tot; for (let d = 0; d < 4; d++) f[d] *= s; }
      for (let d = 0; d < 4; d++) {
        if (!f[d]) continue;
        const nr = r + DIRS[d][0], nc = c + DIRS[d][1];
        if (nr < 0 || nr >= G || nc < 0 || nc >= G) continue;
        const tr = surf[i] * f[d];
        wnext[i]           -= tr;
        wnext[nr * G + nc] += tr;
      }
    }
  }

  // South-edge outlet
  for (let c = 0; c < G; c++) {
    const o = wnext[c] * 0.28;
    outflow += o; wnext[c] -= o;
  }

  for (let i = 0; i < G * G; i++) surf[i] = Math.max(0, wnext[i]);
  tSim += DT;
  if (tSim >= TOTAL) { running = false; done = true; }
}

// ─── Renderer ─────────────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x08140a);
scene.fog = new THREE.Fog(0x08140a, 22, 45);

// Camera — positioned south of valley looking north-up into it
const cam = new THREE.PerspectiveCamera(50, 1, 0.05, 100);
cam.position.set(0, 7, 12);

const orbit = new OrbitControls(cam, canvas);
orbit.target.set(0, 2, 0);
orbit.enableDamping  = true;
orbit.dampingFactor  = 0.08;
orbit.maxPolarAngle  = Math.PI * 0.47;
orbit.minDistance    = 3;
orbit.maxDistance    = 28;
orbit.update();

// Lights
const sun = new THREE.DirectionalLight(0xfff4d0, 1.8);
sun.position.set(4, 12, 6);
sun.castShadow = true;
sun.shadow.camera.left = sun.shadow.camera.bottom = -10;
sun.shadow.camera.right = sun.shadow.camera.top   =  10;
sun.shadow.camera.far   = 40;
sun.shadow.mapSize.set(1024, 1024);
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x88bce0, 0x284818, 0.6));
scene.add(new THREE.AmbientLight(0x304028, 0.5));

// ─── Terrain mesh ─────────────────────────────────────────────────────────────
// Colour ramp based on normalised elevation
function eCol(ne) {
  // 0=dark green valley, 0.5=brown slope, 1=grey ridge
  if (ne < 0.3) {
    const t = ne / 0.3;
    return [0.10 + t*0.18, 0.35 + t*0.05, 0.08 + t*0.10];
  }
  if (ne < 0.7) {
    const t = (ne - 0.3) / 0.4;
    return [0.28 + t*0.22, 0.40 - t*0.08, 0.18 + t*0.06];
  }
  const t = (ne - 0.7) / 0.3;
  return [0.50 + t*0.12, 0.32 + t*0.16, 0.24 + t*0.22];
}

const pos = new Float32Array(G * G * 3);
const col = new Float32Array(G * G * 3);

// Build vertex positions and colours
for (let row = 0; row < G; row++) {
  for (let col2 = 0; col2 < G; col2++) {
    const k = row * G + col2;
    pos[k*3]   = (col2 / (G-1) - 0.5) * W;     // X  (west→east)
    pos[k*3+1] = dem[k] * ES;                    // Y  (elevation)
    pos[k*3+2] = (row / (G-1) - 0.5) * W;       // Z  (south→north)
    const [r, g, b] = eCol(dem[k] / maxDEM);
    col[k*3]=r; col[k*3+1]=g; col[k*3+2]=b;
  }
}

// Triangle indices — two triangles per quad
const idx = [];
for (let row = 0; row < G-1; row++) {
  for (let col2 = 0; col2 < G-1; col2++) {
    const a = row*G + col2;
    const b = a + 1;
    const c = a + G;
    const d = c + 1;
    // CCW winding from above (camera is above, Y up)
    idx.push(a, c, b);
    idx.push(b, c, d);
  }
}

const geo = new THREE.BufferGeometry();
geo.setIndex(idx);
geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
geo.computeVertexNormals();

const mat = new THREE.MeshPhongMaterial({
  vertexColors: true,
  side: THREE.DoubleSide,   // visible from any angle while we tune camera
  shininess: 10,
});
const mesh = new THREE.Mesh(geo, mat);
mesh.receiveShadow = true;
mesh.castShadow    = true;
scene.add(mesh);

// ─── Rain ─────────────────────────────────────────────────────────────────────
const NR  = 1000;
const rp  = new Float32Array(NR * 3);
for (let i = 0; i < NR; i++) {
  rp[i*3]   = (Math.random() - 0.5) * W;
  rp[i*3+1] = Math.random() * 6 + 1;
  rp[i*3+2] = (Math.random() - 0.5) * W;
}
const rgeo  = new THREE.BufferGeometry();
rgeo.setAttribute('position', new THREE.BufferAttribute(rp, 3));
const rain  = new THREE.Points(rgeo,
  new THREE.PointsMaterial({ color: 0x88ccff, size: 0.065, transparent: true, opacity: 0.5 }));
rain.visible = false;
scene.add(rain);

// ─── Mesh update ──────────────────────────────────────────────────────────────
function updateMesh() {
  for (let k = 0; k < G * G; k++) {
    const w   = surf[k];
    const wH  = w > 0.1 ? w * WS : 0;
    pos[k*3+1] = dem[k] * ES + wH;

    const ne = dem[k] / maxDEM;
    const [br, bg, bb] = eCol(ne);
    if (w > 0.25) {
      const t = Math.min(w / 20, 0.9);
      col[k*3]   = br*(1-t) + 0.02*t;
      col[k*3+1] = bg*(1-t) + 0.25*t;
      col[k*3+2] = bb*(1-t) + 0.85*t;
    } else {
      col[k*3]=br; col[k*3+1]=bg; col[k*3+2]=bb;
    }
  }
  geo.attributes.position.needsUpdate = true;
  geo.attributes.color.needsUpdate    = true;
  geo.computeVertexNormals();
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
const elSt = document.getElementById('status');
const elT  = document.getElementById('st');
const elR  = document.getElementById('sr');
const elD  = document.getElementById('sd');

function updateHUD() {
  elT.textContent = tSim.toFixed(1) + ' hr';
  elR.textContent = Math.round(outflow) + ' mm';
  let mx = 0;
  for (let k = 0; k < G*G; k++) if (surf[k] > mx) mx = surf[k];
  elD.textContent = mx.toFixed(1) + ' mm';
  if      (done)                        elSt.textContent = 'Complete';
  else if (!running && tSim === 0)      elSt.textContent = 'Select scenario · Run Storm';
  else if (running && tSim < STORM)     elSt.textContent = 'Storm in progress';
  else                                  elSt.textContent = 'Receding';
}

// ─── Resize ───────────────────────────────────────────────────────────────────
function resize() {
  const vp = canvas.parentElement;
  renderer.setSize(vp.clientWidth, vp.clientHeight);
  cam.aspect = vp.clientWidth / vp.clientHeight;
  cam.updateProjectionMatrix();
}
resize();
new ResizeObserver(resize).observe(canvas.parentElement);

// ─── Loop ─────────────────────────────────────────────────────────────────────
let lt = 0;
function frame(ts) {
  requestAnimationFrame(frame);
  const dt = Math.min((ts - lt) / 1000, 0.05); lt = ts;

  if (running) {
    for (let s = 0; s < spf; s++) simStep();
    updateMesh();
  }

  rain.visible = running && tSim < STORM;
  if (rain.visible) {
    for (let i = 0; i < NR; i++) {
      rp[i*3+1] -= dt * 5;
      if (rp[i*3+1] < -0.5) {
        rp[i*3]   = (Math.random()-0.5)*W;
        rp[i*3+1] = 5 + Math.random()*4;
        rp[i*3+2] = (Math.random()-0.5)*W;
      }
    }
    rgeo.attributes.position.needsUpdate = true;
  }

  updateHUD();
  orbit.update();
  renderer.render(scene, cam);
}

updateMesh();           // show terrain before any button press
requestAnimationFrame(frame);

// ─── Controls ─────────────────────────────────────────────────────────────────
const playBtn = document.getElementById('play');

playBtn.addEventListener('click', () => {
  if (done) return;
  running = !running;
  playBtn.textContent = running ? 'Pause' : 'Resume';
});

document.getElementById('rst').addEventListener('click', () => {
  running = false; playBtn.textContent = '\u25B6 Run Storm';
  allocSim(); updateMesh(); updateHUD();
});

document.querySelectorAll('.sc').forEach(b => b.addEventListener('click', () => {
  scenario = b.dataset.s;
  document.querySelectorAll('.sc').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  running = false; playBtn.textContent = '\u25B6 Run Storm';
  allocSim(); updateMesh(); updateHUD();
}));

document.querySelectorAll('.sp').forEach(b => b.addEventListener('click', () => {
  spf = parseInt(b.dataset.v, 10);
  document.querySelectorAll('.sp').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
}));
</script>
</body>
</html>
