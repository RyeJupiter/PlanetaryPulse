<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Watershed — EarthPulse</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="assets/css/site.css" />
  <script src="assets/js/nav.js" defer></script>
  <script type="importmap">
  {"imports":{
    "three":         "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"
  }}</script>
  <style>
    body { overflow: hidden; }
    .shell {
      height: calc(100vh - 74px);
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 12px 16px 10px;
      box-sizing: border-box;
    }
    .viewport {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(100,140,80,.3);
      box-shadow: 0 16px 48px rgba(0,20,0,.55);
      min-height: 0;
    }
    canvas { width:100%; height:100%; display:block; }

    /* ── HUD ── */
    .hud { position:absolute; inset:0; pointer-events:none; }

    #status {
      position:absolute; top:12px; left:50%; transform:translateX(-50%);
      background:rgba(5,18,8,.85); border:1px solid rgba(80,200,100,.3);
      color:rgba(140,240,155,.95); font-size:11px; font-weight:700;
      letter-spacing:.1em; text-transform:uppercase;
      padding:5px 14px; border-radius:999px; backdrop-filter:blur(8px);
      white-space:nowrap;
    }

    .stats {
      position:absolute; top:12px; right:12px;
      display:grid; gap:5px; text-align:right;
    }
    .stat {
      background:rgba(5,18,8,.82); border:1px solid rgba(80,200,100,.18);
      color:rgba(160,235,175,.9); font-size:11px; font-family:monospace;
      padding:4px 10px; border-radius:8px; backdrop-filter:blur(6px);
    }
    .val { color:#70ffaa; font-weight:700; }

    .legend {
      position:absolute; bottom:12px; left:12px;
      display:grid; gap:4px;
    }
    .leg-row {
      display:flex; align-items:center; gap:7px;
      background:rgba(5,18,8,.76); padding:3px 9px;
      border-radius:6px; font-size:10px; color:rgba(190,230,200,.9);
      backdrop-filter:blur(6px);
    }
    .swatch { width:18px; height:6px; border-radius:2px; flex-shrink:0; }

    /* ── Controls ── */
    .controls {
      display:flex; align-items:center; gap:8px;
      flex-wrap:wrap; padding:9px 0 0;
    }
    .btn {
      padding:7px 16px; border-radius:999px; cursor:pointer; font-size:13px; font-weight:600;
      border:1px solid rgba(100,140,80,.4); background:rgba(248,244,228,.92); color:#1e3020;
      transition:background 140ms, transform 110ms;
    }
    .btn:hover { background:#ede7cc; transform:translateY(-1px); }
    .btn.go   { background:#2d7a4f; border-color:#2d7a4f; color:#fff; }
    .btn.go:hover { background:#389962; }
    .btn.rst  { background:rgba(160,70,55,.1); border-color:rgba(160,70,55,.38); color:#7a3018; }

    .scen-group { display:flex; gap:5px; }
    .scen {
      padding:6px 13px; border-radius:999px; cursor:pointer; font-size:12px; font-weight:600;
      border:1px solid rgba(100,140,80,.28); background:rgba(248,243,222,.85); color:rgba(30,50,28,.88);
      transition:all 140ms;
    }
    .scen:hover { transform:translateY(-1px); }
    .scen.on { color:#fff; }
    .scen[data-s="concrete"].on { background:#b03020; border-color:#b03020; }
    .scen[data-s="degraded"].on { background:#b87010; border-color:#b87010; }
    .scen[data-s="regen"].on    { background:#2d7a4f; border-color:#2d7a4f; }

    .div { width:1px; height:22px; background:rgba(100,140,80,.28); flex-shrink:0; }

    .speed-group { display:flex; gap:4px; align-items:center; }
    .sp-lbl { font-size:11px; color:rgba(30,50,28,.6); margin-right:2px; }
    .sp {
      padding:4px 9px; border-radius:7px; cursor:pointer; font-size:11px;
      border:1px solid rgba(100,140,80,.26); background:rgba(248,243,222,.84); color:rgba(30,50,28,.86);
      transition:all 120ms;
    }
    .sp.on { background:rgba(100,140,80,.22); border-color:rgba(100,140,80,.5); font-weight:700; }
  </style>
</head>
<body data-page="watershed">
<div id="site-nav"></div>

<main class="shell">
  <div class="viewport">
    <canvas id="c"></canvas>
    <div class="hud">
      <div id="status">Select a scenario · press Run Storm</div>
      <div class="stats">
        <div class="stat">Time &nbsp;<span class="val" id="t">0.0 hr</span></div>
        <div class="stat">Runoff &nbsp;<span class="val" id="ro">0 mm</span></div>
        <div class="stat">Max depth &nbsp;<span class="val" id="d">0.0 mm</span></div>
      </div>
      <div class="legend">
        <div class="leg-row"><div class="swatch" style="background:#1050a0"></div>Deep water</div>
        <div class="leg-row"><div class="swatch" style="background:#50a0e0"></div>Surface flow</div>
        <div class="leg-row"><div class="swatch" style="background:#2d5c20"></div>Valley floor</div>
        <div class="leg-row"><div class="swatch" style="background:#705030"></div>Slopes</div>
        <div class="leg-row"><div class="swatch" style="background:#807870"></div>Ridge</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn go"  id="play">▶ Run Storm</button>
    <button class="btn rst" id="reset">↺ Reset</button>
    <div class="div"></div>
    <div class="scen-group">
      <button class="scen"    data-s="concrete">Concrete</button>
      <button class="scen on" data-s="degraded">Degraded Soil</button>
      <button class="scen"    data-s="regen">Regenerative</button>
    </div>
    <div class="div"></div>
    <div class="speed-group">
      <span class="sp-lbl">Speed:</span>
      <button class="sp"    data-v="0.5">½×</button>
      <button class="sp on" data-v="1">1×</button>
      <button class="sp"    data-v="2">2×</button>
      <button class="sp"    data-v="4">4×</button>
    </div>
  </div>
</main>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Grid & world dims ────────────────────────────────────────────────────────
const G = 48;        // cells per side
const W = 10;        // world units across grid
const ES = 0.40;     // elevation scale: DEM unit → Three.js Y
const WS = 0.055;    // water scale: mm → Three.js Y

// ─── Soil scenarios ───────────────────────────────────────────────────────────
const SOIL = {
  concrete: { ksat:  0, cap:   0 },
  degraded: { ksat:  8, cap:  20 },
  regen:    { ksat: 95, cap: 115 },
};

// ─── DEM — pure math, no libraries ───────────────────────────────────────────
// xn ∈ [-1,1]  (west→east),  yn ∈ [0,1]  (south/outlet → north/headwaters)
//
// Verified heights (no noise):
//   ridge corners  (xn=±1, yn=1): 5.5 + 4.0        = 9.5
//   headwaters channel (xn=0, yn=1): 0 + 4.0 - 2.4 = 1.6
//   outlet walls   (xn=±1, yn=0): 5.5               = 5.5
//   outlet channel (xn= 0, yn=0): 0 - 2.4           → clamped 0  ← water exits here
//
// With ES=0.40: max visual height = 9.5 × 0.40 = 3.8 Three.js units  (camera at y=8 sees it fine)

function hash(x, y) {
  // deterministic integer hash → float [0,1)
  let h = Math.imul(x + 1, 2747636419) ^ Math.imul(y + 1, 2654435761);
  h ^= h >>> 16; h = Math.imul(h, 2246822519); h ^= h >>> 13;
  return (h >>> 0) / 0xffffffff;
}
function vnoise(xf, yf) {
  const xi = Math.floor(xf), yi = Math.floor(yf);
  const u  = xf - xi, v = yf - yi;
  const su = u*u*(3-2*u), sv = v*v*(3-2*v);   // smoothstep
  return (hash(xi,yi)  *(1-su) + hash(xi+1,yi)  *su)*(1-sv) +
         (hash(xi,yi+1)*(1-su) + hash(xi+1,yi+1)*su)*sv;
}
function microNoise(xn, yn) {
  // two octaves of value noise; scale chosen so highest freq < 0.5 cells/sample
  const x = xn * 2.5 + 4, y = yn * 2.5 + 7;
  return (vnoise(x, y) - 0.5) * 0.55
       + (vnoise(x*2, y*2) - 0.5) * 0.28;
}

const dem    = new Float32Array(G * G);
let   maxDEM = 0;
for (let r = 0; r < G; r++) {
  for (let c = 0; c < G; c++) {
    const xn = (c / (G-1)) * 2 - 1;
    const yn =  r / (G-1);
    const z  = Math.max(0,
      5.5 * xn * xn                          // valley walls (parabolic)
    + 4.0 * yn                               // drainage slope N→S
    - 2.4 * Math.max(0, 1-(xn/0.28)**2)     // central channel (parabolic notch)
    + microNoise(xn, yn)                     // subtle texture
    );
    dem[r*G+c] = z;
    if (z > maxDEM) maxDEM = z;
  }
}

// ─── Sim state ────────────────────────────────────────────────────────────────
const DT    = 5/60;   // hours per step (5 min)
const RAIN  = 30;     // mm / hr during storm
const STORM = 3;      // storm lasts 3 hr
const TOTAL = 6;      // sim runs 6 hr

let surf, cap, wNext;
let tSim=0, outflow=0, running=false, done=false;
let scenario = 'degraded', spf = 1;  // spf = steps per frame

function reset() {
  surf  = new Float32Array(G*G);
  cap   = new Float32Array(G*G).fill(SOIL[scenario].cap);
  wNext = new Float32Array(G*G);
  tSim=0; outflow=0; done=false;
}
reset();

const DIRS = [[-1,0],[1,0],[0,-1],[0,1]];

function simStep() {
  const { ksat } = SOIL[scenario];

  // 1. Rain
  if (tSim < STORM)
    for (let i = 0; i < G*G; i++) surf[i] += RAIN * DT;

  // 2. Infiltration
  for (let i = 0; i < G*G; i++) {
    const inf = Math.min(surf[i], ksat * DT, cap[i]);
    surf[i] -= inf;
    cap[i]  -= inf;
  }

  // 3. D8 routing with normalised fracs (prevents over-drain)
  wNext.set(surf);
  for (let r = 0; r < G; r++) {
    for (let c = 0; c < G; c++) {
      const i   = r*G+c;
      const hi  = dem[i] + surf[i];
      let tot = 0;
      const f = [0,0,0,0];
      for (let d = 0; d < 4; d++) {
        const nr = r+DIRS[d][0], nc = c+DIRS[d][1];
        if (nr<0||nr>=G||nc<0||nc>=G) continue;
        const dh = hi - (dem[nr*G+nc] + surf[nr*G+nc]);
        if (dh > 0) { f[d] = 0.42 * Math.min(dh/(dh+0.6), 1); tot += f[d]; }
      }
      if (tot === 0) continue;
      if (tot > 1) { const s=1/tot; for (let d=0;d<4;d++) f[d]*=s; }
      for (let d = 0; d < 4; d++) {
        if (!f[d]) continue;
        const nr = r+DIRS[d][0], nc = c+DIRS[d][1];
        if (nr<0||nr>=G||nc<0||nc>=G) continue;
        const tr = surf[i] * f[d];
        wNext[i]       -= tr;
        wNext[nr*G+nc] += tr;
      }
    }
  }

  // 4. South edge outlet drain
  for (let c = 0; c < G; c++) {
    const o = wNext[c] * 0.28;
    outflow   += o;
    wNext[c]  -= o;
  }

  for (let i = 0; i < G*G; i++) surf[i] = Math.max(0, wNext[i]);
  tSim += DT;
  if (tSim >= TOTAL) { running=false; done=true; }
}

// ─── Three.js ─────────────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x08140a);
scene.fog        = new THREE.Fog(0x08140a, 20, 40);

const cam = new THREE.PerspectiveCamera(46, 1, 0.05, 100);
cam.position.set(0, 8, 13);

const orbit = new OrbitControls(cam, canvas);
orbit.target.set(0, 1.5, 0);
orbit.enableDamping = true;
orbit.dampingFactor = 0.08;
orbit.maxPolarAngle = Math.PI * 0.46;
orbit.minDistance = 4; orbit.maxDistance = 26;
cam.lookAt(0, 1.5, 0);

// Lights
const sun = new THREE.DirectionalLight(0xfff6e0, 1.7);
sun.position.set(5, 13, 7);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left = sun.shadow.camera.bottom = -9;
sun.shadow.camera.right = sun.shadow.camera.top   =  9;
sun.shadow.camera.far   = 40;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x80bce0, 0x285018, 0.55));
scene.add(new THREE.AmbientLight(0x304028, 0.5));

// ─── Terrain geometry ─────────────────────────────────────────────────────────
// Colour: valley-floor green → slope brown → ridge stone
function terrainColor(ne) {
  if (ne < 0.20) return [0.10+ne*0.6, 0.36+ne*0.2, 0.10+ne*0.2];
  if (ne < 0.55) {
    const t=(ne-.20)/.35;
    return [0.22+t*.26, 0.40-t*.06, 0.14+t*.06];
  }
  const t=(ne-.55)/.45;
  return [0.48+t*.14, 0.34+t*.18, 0.20+t*.26];
}

const pos = new Float32Array(G*G*3);
const col = new Float32Array(G*G*3);

function setVertex(k) {
  const r = (k/G)|0, c = k%G;
  pos[k*3]   = (c/(G-1) - 0.5) * W;
  pos[k*3+1] = dem[k] * ES;
  pos[k*3+2] = (r/(G-1) - 0.5) * W;
  const [cr,cg,cb] = terrainColor(dem[k]/maxDEM);
  col[k*3]=cr; col[k*3+1]=cg; col[k*3+2]=cb;
}
for (let k=0; k<G*G; k++) setVertex(k);

const idx = [];
for (let r=0;r<G-1;r++) for (let c=0;c<G-1;c++) {
  const a=r*G+c, b=a+1, d=a+G, e=d+1;
  idx.push(a,b,d, b,e,d);
}

const geo = new THREE.BufferGeometry();
geo.setIndex(idx);
geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
geo.computeVertexNormals();

const mat  = new THREE.MeshPhongMaterial({ vertexColors:true, shininess:12, specular:new THREE.Color(0x182414) });
const mesh = new THREE.Mesh(geo, mat);
mesh.receiveShadow = true;
mesh.castShadow    = true;
scene.add(mesh);

// ─── Rain particles ───────────────────────────────────────────────────────────
const NR = 1200;
const rp  = new Float32Array(NR*3);
for (let i=0;i<NR;i++) {
  rp[i*3]   = (Math.random()-.5)*W;
  rp[i*3+1] = Math.random()*7+1;
  rp[i*3+2] = (Math.random()-.5)*W;
}
const rgeo  = new THREE.BufferGeometry();
rgeo.setAttribute('position', new THREE.BufferAttribute(rp, 3));
const rain  = new THREE.Points(rgeo, new THREE.PointsMaterial({ color:0x90c8ff, size:.06, transparent:true, opacity:.5 }));
rain.visible = false;
scene.add(rain);

// ─── Update mesh each sim step ────────────────────────────────────────────────
function updateMesh() {
  for (let k=0;k<G*G;k++) {
    const w  = surf[k];
    const wH = w > 0.08 ? w * WS : 0;
    pos[k*3+1] = dem[k] * ES + wH;

    const ne = dem[k]/maxDEM;
    const [br,bg,bb] = terrainColor(ne);
    if (w > 0.25) {
      const t = Math.min(w/22, 0.88);
      col[k*3]   = br*(1-t) + 0.02*t;
      col[k*3+1] = bg*(1-t) + 0.24*t;
      col[k*3+2] = bb*(1-t) + 0.82*t;
    } else {
      col[k*3]=br; col[k*3+1]=bg; col[k*3+2]=bb;
    }
  }
  geo.attributes.position.needsUpdate = true;
  geo.attributes.color.needsUpdate    = true;
  geo.computeVertexNormals();
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
const elStatus = document.getElementById('status');
const elT  = document.getElementById('t');
const elRo = document.getElementById('ro');
const elD  = document.getElementById('d');

function updateHUD() {
  elT.textContent  = tSim.toFixed(1)+' hr';
  elRo.textContent = Math.round(outflow)+' mm';
  let mx=0; for (let k=0;k<G*G;k++) if(surf[k]>mx) mx=surf[k];
  elD.textContent  = mx.toFixed(1)+' mm';

  if      (done)                           elStatus.textContent = '✓  Complete';
  else if (!running && tSim===0)           elStatus.textContent = 'Select a scenario · press Run Storm';
  else if (running && tSim < STORM)        elStatus.textContent = '🌧  Storm in progress…';
  else                                     elStatus.textContent = '⛅  Receding…';
}

// ─── Resize ───────────────────────────────────────────────────────────────────
function resize() {
  const vp = canvas.parentElement;
  renderer.setSize(vp.clientWidth, vp.clientHeight);
  cam.aspect = vp.clientWidth / vp.clientHeight;
  cam.updateProjectionMatrix();
}
resize();
new ResizeObserver(resize).observe(canvas.parentElement);

// ─── Render loop ──────────────────────────────────────────────────────────────
let lastT = 0;
function frame(ts) {
  requestAnimationFrame(frame);
  const dt = Math.min((ts-lastT)/1000, .05); lastT=ts;

  if (running) {
    for (let s=0; s<spf; s++) simStep();
    updateMesh();
  }

  // Rain particles
  rain.visible = running && tSim < STORM;
  if (rain.visible) {
    for (let i=0;i<NR;i++) {
      rp[i*3+1] -= dt*5;
      if (rp[i*3+1]<-.5) { rp[i*3]=(Math.random()-.5)*W; rp[i*3+1]=5+Math.random()*4; rp[i*3+2]=(Math.random()-.5)*W; }
    }
    rgeo.attributes.position.needsUpdate=true;
  }

  updateHUD();
  orbit.update();
  renderer.render(scene, cam);
}

// Draw terrain immediately — user sees valley before pressing anything
updateMesh();
requestAnimationFrame(frame);

// ─── Controls ─────────────────────────────────────────────────────────────────
const playBtn = document.getElementById('play');

playBtn.addEventListener('click', () => {
  if (done) return;
  running = !running;
  playBtn.textContent = running ? '⏸ Pause' : '▶ Resume';
});

document.getElementById('reset').addEventListener('click', () => {
  running = false;
  playBtn.textContent = '▶ Run Storm';
  reset(); updateMesh(); updateHUD();
});

document.querySelectorAll('.scen').forEach(b => b.addEventListener('click', () => {
  scenario = b.dataset.s;
  document.querySelectorAll('.scen').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  running=false; playBtn.textContent='▶ Run Storm';
  reset(); updateMesh(); updateHUD();
}));

document.querySelectorAll('.sp').forEach(b => b.addEventListener('click', () => {
  spf = Math.max(1, Math.round(parseFloat(b.dataset.v)));
  document.querySelectorAll('.sp').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
}));
</script>
</body>
</html>
